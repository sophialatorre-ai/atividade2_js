<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratos da Sophia</title>
</head>

<body>
    <h1>Pratos da Sophia</h1>
     <script>

        let pratos = prompt("Qual prato você deseja?").toUpperCase();

        switch(pratos){
            case "PIZZA":
                document.write("Vou pedir uma Pizza!");
                break;
            case "HAMBURGUER":
                document.write("Vou pedir um Hamburguer!");
                break;
            case "SUSHI":
                document.write("Vou pedir um Sushi!");
                break;
            case "SALADA":
                document.write("Vou pedir uma salada!");
                break;
                default:
                    document.write(" Seu prato não foi resgistrado")
          
        }
    </script>
</body>
</html>
